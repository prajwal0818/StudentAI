services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
      args:
        REACT_APP_API_URL: ./api
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "5000:5000"
    env_file:
      - ../.env
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/studentai
      - REDIS_URL=redis://redis:6379
    volumes:
      - uploads_data:/app/uploads
      - vectorstore_data:/app/vectorstore
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/api/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  redis_data:
  uploads_data:
  vectorstore_data:
